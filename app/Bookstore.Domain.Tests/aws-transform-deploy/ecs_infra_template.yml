AWSTemplateFormatVersion: '2010-09-09'
Description: 'ATX .NET Application Infrastructure for ECS Deployment'

Parameters:
  TargetName:
    Type: String
    Description: Target name (used for resource naming)
    MinLength: 1
    MaxLength: 64
    Default: TBB

  EcsClusterName:
    Type: String
    Description: ECS Cluster name (leave empty to create new)
    Default: ''

Conditions:
  CreateNewEcsCluster: !Equals [!Ref EcsClusterName, '']

Resources:
  EcsCluster:
    Condition: CreateNewEcsCluster
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub AWSTransform-${TargetName}-ECS-Cluster
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      Tags:
        - Key: ResourceName
          Value: !Sub AWSTransform-${TargetName}-ECS-Cluster
        - Key: CreatedBy
          Value: AWSTransform
        - Key: TransformationType
          Value: DotNET

Outputs:
  EcsClusterName:
    Description: ECS Cluster Name
    Value: !If 
      - CreateNewEcsCluster
      - !Ref EcsCluster
      - !Ref EcsClusterName