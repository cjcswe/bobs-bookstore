AWSTemplateFormatVersion: '2010-09-09'
Description: 'ATX .NET Application Deployment for ECS with Fargate'

Parameters:
  ApplicationName:
    Type: String
    Description: Name of the application
    Default: MyApp

  SubnetIds:
    Type: String
    Description: Private subnet IDs where ECS tasks will run

  SecurityGroupId:
    Type: String
    Description: Security group ID for ECS tasks

  EcsClusterName:
    Type: String
    Description: Name of the ECS cluster to deploy to

  ContainerImageUri:
    Type: String
    Description: URI of existing container image to deploy.
    Default: nginx:latest

  Cpu:
    Type: Number
    Description: CPU units for the ECS task
    Default: 256
    AllowedValues: [256, 512, 1024, 2048, 4096]

  Memory:
    Type: Number
    Description: Memory (MB) for the ECS task
    Default: 512
    AllowedValues: [512, 1024, 2048, 4096, 8192, 16384]

  OperatingSystem:
    Type: String
    Description: Container operating system
    Default: 'Linux'
    AllowedValues: [Linux]

  ContainerPort:
    Type: Number
    Description: The container port to expose
    Default: 5000
    MinValue: 1
    MaxValue: 65535

  EnvironmentVariables:
    Type: String
    Description: Key-value pairs for container environment variables
    Default: '{}'

  TaskCount:
    Type: Number
    Description: Number of tasks ECS will keep active
    Default: 1
    MinValue: 1

Conditions:
  UseEmptyEnvironment: !Equals [!Ref EnvironmentVariables, '{}']

Resources:
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/AWSTransform-${ApplicationName}-Logs
      RetentionInDays: 14
      Tags:
        - Key: ResourceName
          Value: !Sub AWSTransform-${ApplicationName}-Logs
        - Key: CreatedBy
          Value: AWSTransform
        - Key: TransformationType
          Value: DotNET

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub AWSTransform-${ApplicationName}-Task-Definition
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Sub arn:aws:iam::${AWS::AccountId}:role/AWSTransform-Deploy-ECS-Execution-Role
      TaskRoleArn: !Sub arn:aws:iam::${AWS::AccountId}:role/AWSTransform-Deploy-ECS-Task-Role
      RuntimePlatform:
        OperatingSystemFamily: !Ref OperatingSystem
      ContainerDefinitions:
        - Name: !Ref ApplicationName
          Image: !Ref ContainerImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
          Environment: !If 
            - UseEmptyEnvironment
            - !Ref AWS::NoValue
            - !Split [',', !Ref EnvironmentVariables]
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-stream-prefix: 'ecs'
              awslogs-region: !Ref AWS::Region
      Tags:
        - Key: ResourceName
          Value: !Sub AWSTransform-${ApplicationName}-Task-Definition
        - Key: CreatedBy
          Value: AWSTransform
        - Key: TransformationType
          Value: DotNET

  Service:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub AWSTransform-${ApplicationName}-Service
      Cluster: !Ref EcsClusterName
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref TaskCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Split [',', !Ref SubnetIds]
          SecurityGroups:
            - !Ref SecurityGroupId
      Tags:
        - Key: ResourceName
          Value: !Sub AWSTransform-${ApplicationName}-Service
        - Key: CreatedBy
          Value: AWSTransform
        - Key: TransformationType
          Value: DotNET

  ServiceAutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: Service
    Properties:
      MaxCapacity: 10
      MinCapacity: 1
      ResourceId: !Sub 'service/${EcsClusterName}/${ApplicationName}'
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ServiceAutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub AWSTransform-${ApplicationName}-Scaling-Policy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ServiceAutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70

Outputs:
  ServiceName:
    Description: ECS Service Name
    Value: !Ref Service

  TaskDefinitionArn:
    Description: Task Definition ARN
    Value: !Ref TaskDefinition

  LogGroupName:
    Description: CloudWatch Log Group Name
    Value: !Ref LogGroup